name: "AgentCloudKelp"
description: "Behavioral contract testing for AI agents"
inputs:
  contract:
    description: "Path to contract YAML"
    required: false
    default: "kelp.yaml"
  framework:
    description: "Adapter framework"
    required: false
    default: "http"
  model:
    description: "LLM model for judge"
    required: false
    default: "gpt-4o-mini"
  fail_on:
    description: "Failure mode"
    required: false
    default: "any"
  comment:
    description: "Post PR comment"
    required: false
    default: "true"
  python_version:
    description: "Python version"
    required: false
    default: "3.11"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
    - name: Install AgentCloudKelp
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install "${{ github.action_path }}/../.."
    - name: Run AgentCloudKelp
      id: run_agentcloudkelp
      shell: bash
      env:
        AGENTCLOUDKELP_CONTRACT: ${{ inputs.contract }}
        AGENTCLOUDKELP_FRAMEWORK: ${{ inputs.framework }}
        AGENTCLOUDKELP_MODEL: ${{ inputs.model }}
      run: |
        set +e
        OUTPUT="$(python -m agentcloudkelp.cli run -c "${AGENTCLOUDKELP_CONTRACT}" -f "${AGENTCLOUDKELP_FRAMEWORK}" -m "${AGENTCLOUDKELP_MODEL}" -r json 2>&1)"
        STATUS=$?
        echo "$OUTPUT"
        printf '%s' "$OUTPUT" > agentcloudkelp-result.json
        PASSED=true
        if [ "$STATUS" -ne 0 ]; then
          PASSED=false
        fi
        echo "exit_code=$STATUS" >> "$GITHUB_OUTPUT"
        echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
        exit 0
    - name: Post PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const raw = fs.readFileSync('agentcloudkelp-result.json', 'utf8');
          let result;
          try {
            result = JSON.parse(raw);
          } catch (error) {
            result = null;
          }
          const body = result
            ? [
                '## 🔍 AgentCloudKelp Results',
                '',
                '| Contract | Passed | Failed | Cost | Time |',
                '|---|---:|---:|---:|---:|',
                `| ${result.contract_name} | ${result.total_passed} | ${result.total_failed} | $${Number(result.total_cost_usd || 0).toFixed(3)} | ${Number(result.total_time_seconds || 0).toFixed(2)}s |`,
              ].join('\n')
            : `AgentCloudKelp output:\n\n\`\`\`\n${raw}\n\`\`\``;
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body
          });
    - name: Fail on AgentCloudKelp result
      shell: bash
      run: |
        if [ "${{ steps.run_agentcloudkelp.outputs.passed }}" = "true" ]; then
          exit 0
        fi
        if [ "${{ inputs.fail_on }}" = "any" ]; then
          exit 1
        fi
        python - <<'PY'
import json, sys
from pathlib import Path

data = json.loads(Path("agentcloudkelp-result.json").read_text())

assertion_failed = False
gate_failed = False
for scenario in data.get("scenarios", []):
    for step in scenario.get("steps", []):
        if not step.get("passed", True):
            assertion_failed = True
    for gate in scenario.get("gate_results", []):
        if not gate.get("passed", True):
            gate_failed = True

mode = "${{ inputs.fail_on }}"
if mode == "assertion_fail" and assertion_failed:
    sys.exit(1)
if mode == "gate_fail" and gate_failed:
    sys.exit(1)
sys.exit(0)
PY
